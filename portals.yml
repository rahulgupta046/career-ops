# Portal Scanner Configuration
# Customized for Rahul Gupta (ML Infra / GenAI / Backend focus).

title_filter:
  positive:
    - "Machine Learning Engineer"
    - "ML Infrastructure"
    - "ML Platform"
    - "Generative AI"
    - "GenAI"
    - "LLM"
    - "RAG"
    - "AI Engineer"
    - "Backend Engineer"
    - "Platform Engineer"
    - "Recommendation"
    - "Ranking"
    - "Data Pipeline"
    - "MLOps"
    - "LLMOps"
  negative:
    - "Intern"
    - "Internship"
    - "Junior"
    - "Principal Scientist"
    - "Vice President"
    - "Chief"
    - "Sales"
    - "Account Executive"
    - "Nurse"
    - "Physician"
    - "Dentist"
    - "Real Estate"
    - "Truck Driver"
    - "Electrician"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Lead"

search_queries:
  - name: Ashby - ML Infra Remote US
    query: 'site:jobs.ashbyhq.com "ML Infrastructure Engineer" OR "Machine Learning Engineer" "United States" OR remote'
    enabled: true

  - name: Greenhouse - GenAI / LLM US
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "Generative AI Engineer" OR "LLM Engineer" "United States" OR remote'
    enabled: true

  - name: Lever - Backend + ML Platform
    query: 'site:jobs.lever.co "Backend Engineer" OR "ML Platform Engineer" remote "United States"'
    enabled: true

  - name: Wellfound - Early Stage ML Engineer
    query: 'site:wellfound.com "Machine Learning Engineer" OR "AI Engineer" remote "United States"'
    enabled: true

  - name: Workable - ML / GenAI
    query: 'site:apply.workable.com "Machine Learning" OR "Generative AI" "United States" remote'
    enabled: true

  - name: OpenAI Careers
    query: 'site:openai.com/careers "Machine Learning" OR "Backend" OR "Infrastructure"'
    enabled: true

  - name: LinkedIn US ML Infra
    query: 'site:linkedin.com/jobs "ML Infrastructure Engineer" "California" OR "New York" OR remote'
    enabled: true

tracked_companies:
  - name: OpenAI
    careers_url: https://openai.com/careers
    scan_method: websearch
    scan_query: 'site:openai.com/careers "Machine Learning" OR "Backend" OR "Infrastructure"'
    enabled: true

  - name: Anthropic
